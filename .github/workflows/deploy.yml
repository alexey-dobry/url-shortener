name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Tag for rollback (empty = deploy fresh)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      full_image: ${{ steps.meta.outputs.full }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: meta
        run: |
          TAG=$(git rev-parse --short HEAD)
          FULL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "full=$FULL" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.tag }}
            BUILD_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_TAG: ${{ inputs.rollback_tag || needs.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEPLOY_TAG }}"
          echo "APP_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "Deploying: $IMAGE"

      - name: Start db + redis
        run: |
          docker compose up -d db redis
          for i in $(seq 1 30); do
            if docker compose ps --format json | grep -q '"healthy"'; then
              echo "Infrastructure healthy"
              break
            fi
            sleep 2
          done
          docker compose ps

      - name: Run migrations
        run: |
          docker compose run --rm app migrate
          echo "Migrations OK"

      - name: Deploy 3 replicas
        run: |
          docker compose up -d --scale app=3 --no-build
          sleep 15
          docker compose ps

      - name: Smoke test
        id: smoke
        run: |
          set -e

          echo "=== healthz ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          echo "healthz: $STATUS"
          [ "$STATUS" = "200" ]

          echo "=== info ==="
          curl -s http://localhost:8080/info | tee /tmp/info.json
          echo ""
          grep -q "${{ env.DEPLOY_TAG }}" /tmp/info.json

          echo "=== register ==="
          REG_STATUS=$(curl -s -o /tmp/reg.json -w "%{http_code}" -X POST http://localhost:8080/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"username":"ci-test","password":"secret123"}')
          echo "register: $REG_STATUS $(cat /tmp/reg.json)"
          # 201 = created, 409 = already exists (both OK)
          [ "$REG_STATUS" = "201" ] || [ "$REG_STATUS" = "409" ]

          echo "=== login ==="
          LOGIN_STATUS=$(curl -s -o /tmp/login.json -w "%{http_code}" -c /tmp/jar -X POST http://localhost:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"ci-test","password":"secret123"}')
          echo "login: $LOGIN_STATUS $(cat /tmp/login.json)"
          [ "$LOGIN_STATUS" = "200" ]

          echo "=== shorten ==="
          SHORT_STATUS=$(curl -s -o /tmp/short.json -w "%{http_code}" -b /tmp/jar -X POST http://localhost:8080/shorten \
            -H 'Content-Type: application/json' \
            -d '{"url":"https://example.com"}')
          echo "shorten: $SHORT_STATUS $(cat /tmp/short.json)"
          [ "$SHORT_STATUS" = "201" ]

          CODE=$(cat /tmp/short.json | grep -o '"code":"[^"]*"' | cut -d'"' -f4)
          echo "code: $CODE"

          echo "=== stats ==="
          STATS_STATUS=$(curl -s -o /tmp/stats.json -w "%{http_code}" http://localhost:8080/stats/$CODE)
          echo "stats: $STATS_STATUS $(cat /tmp/stats.json)"
          [ "$STATS_STATUS" = "200" ]

          echo "=== All smoke tests passed ==="

      - name: Rollback
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "ROLLING BACK to :main"
          APP_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main" \
            docker compose up -d --scale app=3 --no-build
          sleep 10
          curl -s http://localhost:8080/healthz || true

      - name: Summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- image: \`${{ env.APP_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            echo "- result: ✅ success" >> $GITHUB_STEP_SUMMARY
          else
            echo "- result: ❌ failed → rollback" >> $GITHUB_STEP_SUMMARY
          fi
