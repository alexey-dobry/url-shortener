services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener_pass
      POSTGRES_DB: shortener
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  app:
    image: ${APP_IMAGE:-url-shortener:local}
    build:
      context: .
      args:
        BUILD_VERSION: ${BUILD_VERSION:-local}
        BUILD_COMMIT: ${BUILD_COMMIT:-none}
    env_file:
      - deploy/dev.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_signal: SIGTERM
    stop_grace_period: 30s
    restart: unless-stopped
    networks: [backend]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [app]
    restart: unless-stopped
    networks: [backend]

volumes:
  pgdata:

networks:
  backend:

